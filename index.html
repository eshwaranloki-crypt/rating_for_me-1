<!DOCTYPE html>
<html lang="en">
  <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Student Feedback</title>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
      <link rel="stylesheet" href="style.css">
  </head>
<body>
      <div class="background-shapes">
                <div class="shape shape-1"></div>div>
                <div class="shape shape-2"></div>div>
                <div class="shape shape-3"></div>div>
      </div>div>

      <main class="container">
                <header class="header">
                              <h1>We Value Your Feedback</h1>
                            <p>Please share your experience with us to help us improve.</p>
                </header>header>
      
              <form id="feedbackForm" class="feedback-form">
                          <div class="form-group">
                                          <label for="name">Student Name</label>label>
                                          <input type="text" id="name" name="name" placeholder="John Doe" required>
                          </div>div>
              
                          <div class="form-group">
                                          <label for="email">Email Address</label>label>
                                          <input type="email" id="email" name="email" placeholder="john@example.com" required>
                          </div>div>
              
                          <div class="form-group">
                                          <label>Overall Rating</label>
                                          <div class="star-rating">
                                                              <input type="radio" id="star5" name="rating" value="5" required />
                                                              <label for="star5" title="5 stars">*</label>
                                                              <input type="radio" id="star4" name="rating" value="4" />
                                                              <label for="star4" title="4 stars">*</label>
                                                              <input type="radio" id="star3" name="rating" value="3" />
                                                              <label for="star3" title="3 stars">*</label>
                                                              <input type="radio" id="star2" name="rating" value="2" />
                                                              <label for="star2" title="2 stars">*</label>
                                                              <input type="radio" id="star1" name="rating" value="1" />
                                                              <label for="star1" title="1 star">*</label>
                                          </div>div>
                          </div>div>
              
                          <div class="form-group">
                                          <label for="experience">Overall Experience</label>
                                          <textarea id="experience" name="experience" rows="4" placeholder="Tell us what you loved or what we can do better..."></textarea>
                          </div>div>
              
                          <button type="submit" id="submitBtn" class="submit-btn">
                                          <span>Submit Feedback</span>
                                          <div class="spinner hidden"></div>div>
                          </button>button>
              </form>form>
      
              <div id="statusMessage" class="status-message hidden">
                          <!-- Dynamic message goes here -->
              </div>div>
      </main>main>

    <script src="script.js"></script>
</body>
</html>html></span></label></p></h1>
</body></title>
